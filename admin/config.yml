
backend:
  name: github
  repo: Halidx1/Dental-Website
  branch: main

# Panelden yüklenen görsellerin repo içinde nereye kaydedileceği
media_folder: "images/uploads"
public_folder: "images/uploads"

locale: "tr"

# Sabit ikon seçenekleri (Teknik Servis ve Avantajlar bölümlerinde kullanılır)
# Yeni bir ikon eklemek isterseniz script.js içindeki ICON_KUTUPHANESI'ne
# de eklemeniz gerekir, aksi halde varsayılan diş ikonu gösterilir.
_ikon_secenekleri: &ikon_secenekleri
  - { label: "Diş / Genel", value: "dis" }
  - { label: "Deneyim (Saat)", value: "deneyim" }
  - { label: "Anahtar / Servis", value: "anahtar" }
  - { label: "Marka / Rozet", value: "marka" }
  - { label: "Şube / Konum", value: "sube" }
  - { label: "Kalite / Onay", value: "kalite" }
  - { label: "Müşteri / Memnuniyet", value: "musteri" }
  - { label: "Arıza Tespiti (Büyüteç)", value: "tespit" }
  - { label: "Bakım (Ayarlar)", value: "bakim" }
  - { label: "Destek (Kalkan)", value: "destek" }

collections:

  # ---------------- ÜRÜNLER ----------------
  - name: "urunler"
    label: "Ürünler"
    files:
      - name: "urunler"
        label: "Ürün Listesi"
        file: "content/urunler.json"
        fields:
          - label: "Ürünler"
            name: "urunler"
            widget: "list"
            summary: "{{fields.baslik}} ({{fields.kategori}})"
            fields:
              - { label: "Ürün ID (benzersiz, boşluksuz, örn: yeni-urun-adi)", name: "id", widget: "string" }
              - { label: "Kategori", name: "kategori", widget: "string", hint: "Anasayfadaki 'Hakkımızda' bölümünde bu kategoriler otomatik olarak ikonlu şekilde listelenir." }
              - { label: "Başlık", name: "baslik", widget: "string" }
              - { label: "Açıklama", name: "aciklama", widget: "text" }
              - label: "Özellikler"
                name: "ozellikler"
                widget: "list"
                field: { label: "Özellik", name: "ozellik", widget: "string" }
              - label: "Görseller"
                name: "gorseller"
                widget: "list"
                field: { label: "Görsel", name: "gorsel", widget: "image" }

  # ---------------- MARKALAR ----------------
  - name: "markalar"
    label: "Markalar"
    files:
      - name: "markalar"
        label: "Marka Listesi"
        file: "content/markalar.json"
        fields:
          - label: "Markalar"
            name: "markalar"
            widget: "list"
            summary: "{{fields.ad}}"
            fields:
              - { label: "Marka Adı", name: "ad", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Web Sitesi (URL)", name: "url", widget: "string" }

  # ---------------- DUYURULAR ----------------
  - name: "duyurular"
    label: "Duyurular"
    files:
      - name: "duyurular"
        label: "Duyuru Listesi"
        file: "content/duyurular.json"
        fields:
          - label: "Duyurular"
            name: "duyurular"
            widget: "list"
            summary: "{{fields.baslik}}"
            fields:
              - { label: "Duyuru ID (benzersiz, boşluksuz)", name: "id", widget: "string" }
              - { label: "Başlık", name: "baslik", widget: "string" }
              - { label: "Açıklama", name: "aciklama", widget: "text" }
              - { label: "Görsel", name: "gorsel", widget: "image", required: false, hint: "Boş bırakılırsa kart üzerinde gri bir alan gösterilir." }
              - { label: "Tarih", name: "tarih", widget: "datetime", required: false }

  # ---------------- İLETİŞİM BİLGİLERİ ----------------
  - name: "iletisim"
    label: "İletişim Bilgileri"
    files:
      - name: "iletisim"
        label: "İletişim ve Şube Bilgileri"
        file: "content/iletisim.json"
        fields:
          - label: "Bursa Merkez"
            name: "merkez"
            widget: "object"
            fields:
              - { label: "Başlık (footer ve iletişim sayfasında görünür)", name: "baslik", widget: "string" }
              - { label: "Adres", name: "adres", widget: "string" }
              - { label: "Sabit Telefon", name: "tel", widget: "string" }
              - { label: "Mobil Telefon", name: "mobil", widget: "string" }
              - { label: "E-posta", name: "mail", widget: "string" }
          - label: "İstanbul Şube"
            name: "sube"
            widget: "object"
            fields:
              - { label: "Başlık (footer ve iletişim sayfasında görünür)", name: "baslik", widget: "string" }
              - { label: "Adres", name: "adres", widget: "string" }
              - { label: "Sabit Telefon", name: "tel", widget: "string" }
              - { label: "Mobil Telefon", name: "mobil", widget: "string" }
              - { label: "E-posta", name: "mail", widget: "string" }
          - { label: "Footer'da Görünen Kısa Adres", name: "footer_adres_kisa", widget: "string" }
          - { label: "Footer'da Görünen Telefon", name: "footer_telefon", widget: "string" }
          - { label: "Anasayfa Teknik Servis Telefonu", name: "cta_teknik_servis_tel", widget: "string" }
          - { label: "WhatsApp Numarası (ülke kodu ile, boşluksuz, örn: 905315652209)", name: "whatsapp_numara", widget: "string" }

  # ---------------- KURUMSAL (Teknik Servis / Avantajlar / İstatistikler) ----------------
  - name: "kurumsal"
    label: "Kurumsal Bilgiler"
    files:
      - name: "kurumsal"
        label: "Teknik Servis, Avantajlar ve İstatistikler"
        file: "content/kurumsal.json"
        fields:
          - label: "Teknik Servis Bölümü (Anasayfa, Hakkımızda'dan önce)"
            name: "teknik_servis"
            widget: "object"
            fields:
              - { label: "Kısa Açıklama", name: "aciklama", widget: "text" }
              - label: "Hizmetler"
                name: "hizmetler"
                widget: "list"
                summary: "{{fields.baslik}}"
                fields:
                  - { label: "İkon", name: "ikon", widget: "select", options: *ikon_secenekleri }
                  - { label: "Başlık", name: "baslik", widget: "string" }
                  - { label: "Açıklama", name: "aciklama", widget: "text" }
          - label: "Avantajlarımız Bölümü"
            name: "avantajlar"
            widget: "list"
            summary: "{{fields.baslik}}"
            fields:
              - { label: "İkon", name: "ikon", widget: "select", options: *ikon_secenekleri }
              - { label: "Başlık", name: "baslik", widget: "string" }
              - { label: "Açıklama", name: "aciklama", widget: "text" }
          - label: "İstatistikler Bölümü"
            name: "istatistikler"
            widget: "list"
            summary: "{{fields.sayi}} — {{fields.etiket}}"
            hint: "Yalnızca doğruluğundan emin olduğunuz rakamları ekleyin (örn. ürün çeşidi, mutlu müşteri sayısı vb.)."
            fields:
              - { label: "Sayı (örn: 40+, 3.000, 81)", name: "sayi", widget: "string" }
              - { label: "Etiket (örn: Yıllık Deneyim)", name: "etiket", widget: "string" }
